<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Let's Chat: Asking for Help Naturally</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 400px;
  height: 580px;
  overflow: hidden;
  background: transparent;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

.device {
  width: 400px; height: 580px;
  display: flex; flex-direction: column;
  overflow: hidden;
}

.kk-header {
  background: #3c1e1e;
  padding: 12px 16px 10px;
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.kk-back { color: #f9e000; font-size: 16px; font-weight: 500; }
.kk-room-name {
  color: #fff; font-size: 15px; font-weight: 500; flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  min-width: 0;
}
.kk-count { color: rgba(255,255,255,0.55); font-size: 13px; white-space: nowrap; }

.kk-body {
  background: #b2c7d9;
  flex: 1; overflow-y: auto;
  padding: 12px 10px;
  display: flex; flex-direction: column; gap: 4px;
  scroll-behavior: smooth;
}

.date-divider { text-align: center; margin: 6px 0 8px; }
.date-divider span {
  background: rgba(0,0,0,0.18); color: #fff;
  font-size: 11px; padding: 3px 12px; border-radius: 20px;
}

.section-divider { text-align: center; margin: 8px 0 4px; }
.section-divider span {
  background: rgba(0,0,0,0.12); color: rgba(255,255,255,0.9);
  font-size: 10px; padding: 2px 10px; border-radius: 20px; font-weight: 500;
}

.msg-row { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 2px; }
.msg-row.right { flex-direction: row-reverse; }

.avatar-col { display: flex; flex-direction: column; align-items: center; width: 36px; flex-shrink: 0; }
.avatar {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  font-size: 13px;
  font-weight: 500;
  line-height: 1;        /* ← key fix */
  text-align: center;
}
.avatar-letter { position: relative; z-index: 1; }
.avatar-image {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 2;
  display: block;
}

.msg-col { display: flex; flex-direction: column; max-width: 68%; }
.msg-col.right { align-items: flex-end; }

.sender-name { font-size: 11px; color: rgba(0,0,0,0.55); margin-bottom: 3px; padding-left: 2px; }
.sender-name.right { padding-left: 0; padding-right: 2px; }

.bubble-wrap { display: flex; align-items: flex-end; gap: 4px; }
.bubble-wrap.right { flex-direction: row-reverse; }

.bubble {
  padding: 8px 11px; font-size: 13px; line-height: 1.5;
  color: #1a1a1a; max-width: 100%; word-break: break-word;
}
.bubble.left  { background: #fff;    border-radius: 0 12px 12px 12px; }
.bubble.right { background: #f9e000; border-radius: 12px 0 12px 12px; }
.bubble.pop   { animation: popIn 0.2s ease-out; }

@keyframes popIn {
  from { opacity: 0; transform: scale(0.88); }
  to   { opacity: 1; transform: scale(1); }
}

.time-stamp { font-size: 10px; color: rgba(0,0,0,0.4); white-space: nowrap; margin-bottom: 2px; }

.bubble-img {
  max-width: 100%; max-height: 200px; width: auto; display: block;
  object-fit: cover; overflow: hidden;
  margin-bottom: 4px;
}
.bubble-img.left  { border-radius: 0 12px 12px 12px; }
.bubble-img.right { border-radius: 12px 0 12px 12px; }

.kk-footer {
  background: #f0f0f0; border-top: 0.5px solid #d0d0d0;
  padding: 8px 12px; display: flex; align-items: center; gap: 8px;
  flex-shrink: 0;
}
.kk-input {
  flex: 1; background: #fff; border: 0.5px solid #d0d0d0;
  border-radius: 20px; padding: 7px 14px; font-size: 13px; color: #999;
}
.kk-send {
  width: 32px; height: 32px; background: #f9e000; border-radius: 50%;
  border: none; display: flex; align-items: center; justify-content: center;
}
</style>
</head>
<body>

<div class="device">
  <div class="kk-header">
    <span class="kk-back">&#8249;</span>
    <span class="kk-room-name">Let's Chat: Asking for Help Naturally</span>
    <span class="kk-count">2</span>
  </div>
  <div class="kk-body" id="chat-body">
    <div class="date-divider"><span id="chat-date"></span></div>
    <div class="section-divider"><span>[톡톡 인사말]</span></div>
  </div>
  <div class="kk-footer">
    <div class="kk-input">Type a message</div>
    <div class="kk-send">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M1 7L13 1L9 13L7 8L1 7Z" fill="#3c2e00"/>
      </svg>
    </div>
  </div>
</div>
<script>

const body = document.getElementById('chat-body');
(function() {
  var d = new Date();
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('chat-date').textContent = months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
})();
const ME = "host_1";
const SHOW_AVATAR = true;
const HOST_MAP = {"host_1":{"letter":"민","bg":"#f9e000","fg":"#3c2e00","image":"file:///C:/Workspace/Personal/playchat/fixtures/host_1.png"},"host_2":{"letter":"A","bg":"#ff7043","fg":"#fff","image":"file:///C:/Workspace/Personal/playchat/fixtures/host_2.png"}};

var _virtualClockMs = Date.now();
function getTime(audioDurationSec) {
  var t = new Date(_virtualClockMs);
  var h = t.getHours(), m = t.getMinutes();
  var ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  var stamp = ampm + ' ' + h + ':' + (m < 10 ? '0' : '') + m;
  if (audioDurationSec && audioDurationSec > 0) {
    _virtualClockMs += audioDurationSec * 1000;
  }
  return stamp;
}

function avatarHTML(d) {
  var info = HOST_MAP[d.speaker] || { letter: d.name.charAt(0), bg: '#999', fg: '#fff', image: '' };
  var image = info.image ? '<img class="avatar-image" src="' + info.image + '" onerror="this.remove()" />' : '';
  return '<div class="avatar-col"><div class="avatar" style="background:' + info.bg + ';color:' + info.fg + '"><span class="avatar-letter">' + info.letter + '</span>' + image + '</div></div>';
}

function appendMsg(d) {
  var side = d.speaker === ME ? 'right' : 'left';
  var t = getTime(d.audioDurationSec);

  if (d.section !== lastSection) {
    var div = document.createElement('div');
    div.className = 'section-divider';
    div.innerHTML = '<span>' + d.section + '</span>';
    body.appendChild(div);
    lastSection = d.section;
  }

  var row = document.createElement('div');
  row.className = 'msg-row' + (side === 'right' ? ' right' : '');
  var html = '';
  if (SHOW_AVATAR) html += avatarHTML(d);
  html += '<div class="msg-col' + (side === 'right' ? ' right' : '') + '">';
  if (SHOW_AVATAR) html += '<div class="sender-name' + (side === 'right' ? ' right' : '') + '">' + d.name + '</div>';
  if (d.image) html += '<img class="bubble-img ' + side + '" src="' + d.image + '" onerror="this.remove()" />';
  html +=
      '<div class="bubble-wrap' + (side === 'right' ? ' right' : '') + '">' +
        '<div class="bubble ' + side + ' pop">' + d.text + '</div>' +
        '<span class="time-stamp">' + t + '</span>' +
      '</div>' +
    '</div>';
  row.innerHTML = html;

  body.appendChild(row);
  body.scrollTop = body.scrollHeight;
}


const dialogues = [{"speaker":"host_1","name":"민수","text":"여러분, 톡톡 영어에 오신 걸 환영합니다! 오늘도 자연스럽고 살아있는 영어, 함께 배워볼까요?","audio":"https://storage.googleapis.com/maplesoup-stroage-bucket/f/podcast/cc244236af424699/segment_0000.mp3","audioRaw":"https://storage.googleapis.com/maplesoup-stroage-bucket/f/podcast/cc244236af424699/segment_0000.mp3","section":"[톡톡 인사말]","audioDurationSec":8.208,"image":"file:///C:/Workspace/Personal/playchat/_audio_cache/85e1894b6eae4e46.jpg","imageRaw":"https://live.staticflickr.com/5145/5851641484_36762ab9af_b.jpg"},{"speaker":"host_2","name":"Ashley","text":"Hi everyone! Today's phrase is all about asking for help in a very natural way. Let's get started!","audio":"https://storage.googleapis.com/maplesoup-stroage-bucket/f/podcast/c771c9018d984cbc/segment_0001.mp3","audioRaw":"https://storage.googleapis.com/maplesoup-stroage-bucket/f/podcast/c771c9018d984cbc/segment_0001.mp3","section":"[톡톡 인사말]","audioDurationSec":5.568,"image":"","imageRaw":""},{"speaker":"host_1","name":"민수","text":"Oh, 제일 필요한 표현인데요! 오늘의 표현은 'Could you give me a hand?'예요.","audio":"https://storage.googleapis.com/maplesoup-stroage-bucket/f/podcast/4d268c8faf774183/segment_0002.mp3","audioRaw":"https://storage.googleapis.com/maplesoup-stroage-bucket/f/podcast/4d268c8faf774183/segment_0002.mp3","section":"[톡톡 인사말]","audioDurationSec":5.664,"image":"","imageRaw":""},{"speaker":"host_1","name":"민수","text":"Ashley, 오늘 짐 옮기는데 좀 도와줄 수 있어요? 무거워서 혼자 못 하겠어요.","audio":"https://storage.googleapis.com/maplesoup-stroage-bucket/f/podcast/ee016cde93ea4f05/segment_0004.mp3","audioRaw":"https://storage.googleapis.com/maplesoup-stroage-bucket/f/podcast/ee016cde93ea4f05/segment_0004.mp3","section":"[실전 영어 상황극]","audioDurationSec":6.096,"image":"","imageRaw":""},{"speaker":"host_2","name":"Ashley","text":"Sure! That's when you can say, 'Could you give me a hand with this?' Let me help you.","audio":"https://storage.googleapis.com/maplesoup-stroage-bucket/f/podcast/803591e8239d4493/segment_0005.mp3","audioRaw":"https://storage.googleapis.com/maplesoup-stroage-bucket/f/podcast/803591e8239d4493/segment_0005.mp3","section":"[실전 영어 상황극]","audioDurationSec":3.888,"image":"","imageRaw":""}];
const TOTAL = dialogues.length;
let idx = 0, isPlaying = false, currentAudio = null;
let lastSection = "[톡톡 인사말]";
const POST_AUDIO_GAP_MS = 400;

function playNext() {
  if (idx >= TOTAL) {
    isPlaying = false;
    document.body.dataset.done = '1';
    return;
  }
  const d = dialogues[idx];
  appendMsg(d);
  idx++;

  if (d.audio) {
    currentAudio = new Audio(d.audio);
    currentAudio.onended = function() { setTimeout(playNext, POST_AUDIO_GAP_MS); };
    currentAudio.onerror = function() { setTimeout(playNext, 2000); };
    currentAudio.play().catch(function() { setTimeout(playNext, 2000); });
  } else {
    setTimeout(playNext, 3000);
  }
}

/**
 * Scrubber mode: the recorder is the sole clock. It calls
 * window.__SCRUB__(frameTimeMs) before every screenshot. This function
 * renders all messages whose showAtMs <= frameTimeMs that haven't been
 * shown yet. No browser-side timers are used — zero drift.
 *
 * window.__TIMELINE__ must be set (via evaluateOnNewDocument) before load.
 */
function initScrubberMode(timeline) {
  var chatBody = document.getElementById('chat-body');
  if (chatBody) chatBody.style.scrollBehavior = 'auto';
  var noAnim = document.createElement('style');
  noAnim.textContent = '*, *::before, *::after { animation-duration: 0s !important; }';
  document.head.appendChild(noAnim);
  var rendered = 0;
  window.__SCRUB__ = function(nowMs) {
    while (
      rendered < dialogues.length &&
      rendered < timeline.length &&
      timeline[rendered] <= nowMs
    ) {
      appendMsg(dialogues[rendered]);
      rendered++;
    }
    if (rendered >= dialogues.length || rendered >= timeline.length) {
      document.body.dataset.done = '1';
    }
  };
}

window.addEventListener('load', function() {
  if (Array.isArray(window.__TIMELINE__) && window.__TIMELINE__.length > 0) {
    initScrubberMode(window.__TIMELINE__);
    return;
  }

  // Preview mode now auto-starts by default. Users can still opt out via ?autoplay=0.
  var autoplay = new URLSearchParams(location.search).get('autoplay');
  if (autoplay === '0') return;

  setTimeout(function() { isPlaying = true; playNext(); }, 800);
});

</script>
